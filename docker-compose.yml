version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crm_redis
    restart: always
    ports:
      - "6379:6379"
    # This line enables the password requirement
    command: redis-server --requirepass ADMIN12345

  mailpit:
    image: axllent/mailpit
    container_name: crm_mailpit
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
